<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmLocator Tumbaco</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Modal Permiso GPS -->
    <div id="modal-gps" class="modal-overlay" role="dialog" aria-labelledby="gps-title" aria-modal="true">
        <div class="modal-content">
            <h2 id="gps-title">Permiso de Ubicación</h2>
            <p>Para mostrarte las farmacias más cercanas, necesitamos acceder a tu ubicación.</p>
            <button id="btn-activar-gps" class="btn-primary skeleton" disabled>Activar GPS</button>
        </div>
    </div>


    <div id="loading-overlay" class="oculto" role="alert" aria-live="assertive" aria-busy="true">
        <div class="loading-ring" aria-hidden="true"></div>
        <div class="loading-text">
            <h2>Ubicando farmacias...</h2>
            <p>Escaneando radio de 2.0km. Por favor, espere.</p>
        </div>
    </div>

    <div id="aviso-ubicacion" class="oculto"
        style="position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 30000; width: 90%; max-width: 400px;">
        <div
            style="background: var(--color-superficie); color: white; padding: 15px; border-left: 5px solid var(--color-azul-rey); border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
            <p id="txt-aviso" style="font-size: 0.9rem; margin: 0;"></p>
        </div>
    </div>

    <h1 class="sr-only">FarmLocator Tumbaco - Radar de Emergencia</h1>

    <div id="brand-watermark" aria-hidden="true">
        FarmLocator <strong>Tumbaco</strong>
    </div>

    <main>
        <section id="map" aria-label="Mapa interactivo de farmacias en Tumbaco" role="application"></section>
    </main>

    <!-- Botón Recentrar -->
    <button class="btn-recenter" id="btn-recenter" aria-label="Centrar mapa en mi ubicación">
        <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
                d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z" />
        </svg>
    </button>

    <section id="bottom-sheet" aria-modal="true" role="dialog" aria-labelledby="bs-nombre" aria-hidden="true">
        <div class="drag-handle"></div>
        <button id="btn-cerrar-bs" aria-label="Cerrar panel">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>

        <div class="info-farmacia" aria-live="polite">
            <h2 id="bs-nombre">Cargando...</h2>
            <p id="bs-distancia"></p>
            <div id="contenedor-horario">
                <p id="bs-estado" style="font-weight: bold; margin: 5px 0;"></p>
                <p id="bs-horario"></p>
                <small id="bs-advertencia-horario" style="color: #666; font-style: italic;">Horario referencial: Sujeto
                    a disponibilidad.</small>
            </div>
        </div>

        <div class="acciones-contenedor" style="display: flex; flex-direction: column; gap: 10px;">
            <!-- NUEVO: Contenedor Dual para Contactos -->
            <div id="contenedor-contactos" style="display: flex; gap: 10px; width: 100%; display: none;">
                <!-- Botón WhatsApp -->
                <button id="btn-whatsapp" class="btn-accion"
                    style="flex: 1; background-color: var(--color-verde-whatsapp); display: none;">
                    <svg class="icon-svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <path
                            d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z" />
                        <path
                            d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.118 1.523 5.845L.057 23.428l5.752-1.506A11.95 11.95 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.907 0-3.694-.497-5.241-1.369l-.373-.221-3.415.895.91-3.326-.243-.387A9.956 9.956 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z" />
                    </svg>
                    <span>WhatsApp</span>
                </button>

                <!-- Botón Llamar -->
                <button id="btn-llamar" class="btn-accion" style="flex: 1; background-color: #757575; display: none;">
                    <svg class="icon-svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <path
                            d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z" />
                    </svg>
                    <span>Llamar</span>
                </button>
            </div>

            <button id="btn-navegar" class="btn-accion" style="background-color: var(--color-azul-rey);">
                <svg class="icon-svg" viewBox="0 0 24 24">
                    <path
                        d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" />
                </svg>
                <span>Ir Ahora</span>
            </button>
        </div>
    </section>

    <!-- Botón Estado Vacío (Heurística 9) -->
    <button id="btn-expandir-5km" class="btn-expandir oculto" aria-label="Expandir búsqueda a 5 kilómetros">
        Buscar a 5km
    </button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>

</html>
